<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send Feedback - Chaturveda</title>

<style>

body{
font-family:"Noto Sans",sans-serif;
background:#fafafa;
margin:0;
}

.header{
background:#8b4513;
color:white;
padding:22px;
font-size:24px;
}


.card{
background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 8px #ddd;
}


textarea{

width:100%;
height:150px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;

}


button{

background:#8b4513;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;

}

</style>

</head>


<body>


<div class="header">
💡 Send Feedback
</div>


<div class="card">


<p>
Help us improve Chaturveda by sharing your suggestions.
</p>


<textarea placeholder="Write your feedback here..."></textarea>


<br><br>


<button onclick="sendFeedback()">
Submit Feedback
</button>


</div>



<script>

function sendFeedback(){

alert("Thank you for your valuable feedback.");

}

</script>


</body>

</html>
