<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>চতুর্বেদ সংকলন</title>
<link rel="stylesheet" href="css/app.css?v=31">
</head>
<body>

<div class="appBar">
  <button id="backBtn" class="iconBtn" aria-label="পেছনে">←</button>
  <div id="appTitle">চতুর্বেদ সংকলন</div>
  <button id="searchBtn" class="iconBtn" aria-label="খুঁজুন">⌕</button>
</div>

<div id="app"></div>

<script src="js/db.js?v=31"></script>
<script src="js/lib.js?v=31"></script>
<script src="js/app.js?v=31"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
    window.Capacitor.Plugins.App.addListener("backButton", function () {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.Capacitor.Plugins.App.exitApp();
      }
    });
  }
});
</script>
</body>
</html>
