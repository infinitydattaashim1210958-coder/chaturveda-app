name: Build Chaturveda APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
  uses: actions/setup-node@v4
  with:
    node-version: '24'
    cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Download core database from latest Release
        run: |
          mkdir -p www/assets/databases
          curl -L -o core.db.gz \
            "https://github.com/${{ github.repository }}/releases/latest/download/core.db.gz"
          gunzip -f core.db.gz
          mv core.db www/assets/databases/core.db
          ls -la www/assets/databases/

      - name: Add Android platform if missing
  run: |
    if [ ! -d "android" ]; then
      npx cap add android
    fi

      - name: Generate app icons and splash screen
        run: npx @capacitor/assets generate --android

      - name: Sync web assets + plugins into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Do not compress the .db asset (avoids OOM on a large SQLite file)
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if ! grep -q "aaptOptions" "$BUILD_GRADLE"; then
            sed -i '/^android {/a\    aaptOptions { noCompress "db" }' "$BUILD_GRADLE"
          fi
          echo "----- android block after patch -----"
          grep -n "aaptOptions" -A 2 "$BUILD_GRADLE"

      - name: Increase Gradle daemon heap size
        run: |
          {
            echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "org.gradle.daemon=false"
          } >> android/gradle.properties
          cat android/gradle.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaturveda-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
