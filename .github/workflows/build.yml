name: Build Chaturveda APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Download Chaturveda database from latest Release
        run: |
          mkdir -p www/assets/databases
          curl -L -o chaturveda.db.gz \
            "https://github.com/${{ github.repository }}/releases/latest/download/chaturveda.db.gz"
          gunzip -f chaturveda.db.gz
          mv chaturveda.db www/assets/databases/chaturveda.db
          ls -la www/assets/databases/

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash screen
        run: npx @capacitor/assets generate --android

      - name: Sync web assets + plugins into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaturveda-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
