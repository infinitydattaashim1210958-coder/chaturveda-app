name: Build Chaturveda APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Download core database from latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p www/assets/databases
          gh release download --repo "${{ github.repository }}" --pattern "core.db.gz" --clobber --dir .
          gunzip -f core.db.gz
          mv core.db www/assets/databases/core.db
          echo "core.db size: $(du -sh www/assets/databases/core.db)"

      - name: Download Ramayana database from latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo "${{ github.repository }}" --pattern "ramayana.db.gz" --clobber --dir .
          gunzip -f ramayana.db.gz
          mv ramayana.db www/assets/databases/ramayana.db
          echo "ramayana.db size: $(du -sh www/assets/databases/ramayana.db)"

      - name: List databases
        run: ls -lh www/assets/databases/

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash screen
        run: npx @capacitor/assets generate --android

      - name: Sync web assets + plugins into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Do not compress .db assets (avoids OOM on large SQLite files)
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if ! grep -q "aaptOptions" "$BUILD_GRADLE"; then
            sed -i '/^android {/a\    aaptOptions { noCompress "db" }' "$BUILD_GRADLE"
          fi
          echo "----- aaptOptions after patch -----"
          grep -n "aaptOptions" -A 2 "$BUILD_GRADLE"

      - name: Increase Gradle daemon heap size
        run: |
          {
            echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "org.gradle.daemon=false"
          } >> android/gradle.properties
          cat android/gradle.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaturveda-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
